<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · OneKash Labs</title>
    <meta name="description" content="The page you're looking for doesn't exist.">
    <meta name="theme-color" content="#0D1413">
    <meta name="color-scheme" content="dark">
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="images/logo-32-favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
:root{--ink:#0D1413;--fg:#EEF3F1;--fg-2:#A9B7B2;--fg-3:#7C8B86;--teal:#45C2AD;--brass:#F4B740;--line:rgba(230,240,237,.12);--serif:'Fraunces',Georgia,serif;--mono:'JetBrains Mono',ui-monospace,monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--mono);background:var(--ink);color:var(--fg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
body::before{content:'';position:fixed;inset:0 0 auto 0;height:60vh;background:radial-gradient(ellipse 55% 55% at 50% -5%,rgba(69,194,173,.08),transparent);pointer-events:none}
.code{font:500 .8rem/1 var(--mono);letter-spacing:.28em;color:var(--brass);margin-bottom:1.25rem}
h1{font-family:var(--serif);font-weight:500;font-size:clamp(2rem,5vw,3rem);letter-spacing:-.02em;margin-bottom:1rem}
p{color:var(--fg-2);font-size:.95rem;max-width:30em;margin-bottom:2rem;line-height:1.6}
.home{font:500 .88rem/1 var(--mono);color:var(--teal);text-decoration:none;padding:.75rem 1.4rem;border:1px solid var(--line);border-radius:100px;transition:border-color .25s,box-shadow .25s}
.home:hover{border-color:var(--teal);box-shadow:0 0 20px rgba(69,194,173,.15)}
.home .p{color:var(--fg-3)}
</style>
</head>
<body>
    <p class="code">404</p>
    <h1>This experiment didn't ship.</h1>
    <p>The page you're looking for doesn't exist, or never left the lab. Head back and pick up from there.</p>
    <a href="/" class="home"><span class="p">$</span> cd ~</a>
</body>
</html>
